<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="wallpaper" aria-hidden="true"></div>
    <div id="logo-intro" aria-hidden="true">
      <img id="logo-intro-img" src="./icons/logo.png" alt="Logo" />
    </div>
    <div id="end-assets" aria-hidden="true">
      <img id="end-text-image" src="./icons/text.png" alt="Text" />
      <img id="end-qr-image" src="./icons/qrcode.png" alt="QR code" />
    </div>
    <div id="app"></div>
    <div id="cinematic-veil"></div>
    <div id="scroll-track" aria-hidden="true"></div>
    <section id="reveal-copy" aria-label="Wine story">
      <h2>
        <span class="line">함께하면 더 특별한 밤.</span>
      </h2>
      <p><span class="line">오늘, UTKCC와 함께 건배하세요</span></p>
    </section>
    <script type="module" src="./app.js"></script>
  </body>
</html>
